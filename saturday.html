}

    <body>
        <a href="index.html">home</a>
        <div class="container">
            <h1>select time and fill out information</h1>
        
        <div class ="dropdown3">
            <label for="time3">Select time here:</label>
        <select name="time3" id="time3">
        <option value="2 pm">2 pm</option>
        <option value="3 pm">3 pm</option> 
        <option value="4 pm">4 pm</option>
        <option value="5 pm">5 pm</option> 
        <option value="6 pm">6 pm</option>      
        </select>
        <br>
        <br>
        <label for="duration2">Select the duration of the walk</label>

        </select>
        </div>

        <div class="contactContainer">

        <label >Anything I should know about your dog? :</label>
        <div class="information3">
            
            <textarea name="information3" id="information3" type="text" ></textarea>
        </div>
        <button type="button" onClick="retrieveData3()">Submit</button>
        </div>
        
    </body>
    <script>
        function retrieveData3(){
            var parms= {
            message : "the day will be Saturday at "+document.getElementById("time3").value + "\n my name is " + 
            document.getElementById("name3").value +"\n you can contact me at "+ document.getElementById("contact3").value +
            " additional information you should know about my dog is "+ document.getElementById("information3").value+"\n The duration will be "+document.getElementById("duration2").value,

            name: document.getElementById("name3").value
           }
            emailjs.send("service_m0ztu9j","template_ztmy1fc",parms).then(()=>{
                    window.location.href="sent.html";
            });
        }

    </script>
